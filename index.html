<!DOCTYPE html>
<html lang="kmr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BADINAN FILM PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; --bg: #030508; --card-bg: #0a0f14;
            --text-gray: #888; --gold: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- Security Wall --- */
        #auth-wall { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .lock-box { width: 100%; max-width: 350px; text-align: center; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; margin-bottom: 20px; text-align: center; font-size: 18px; outline: none; }
        .go-btn { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* --- Header --- */
        #app { display: none; }
        header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-weight: 900; font-size: 22px; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        .section-header { padding: 20px 25px 10px; font-size: 16px; font-weight: 600; color: var(--primary); text-align: right; }

        /* --- Movie Grid for Mobile --- */
        #main-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 10px 20px 30px; 
        }
        
        /* --- Card Design --- */
        .card { width: 100%; cursor: pointer; transition: transform 0.3s; }
        .card:active { transform: scale(0.95); }
        .card-img-box { width: 100%; height: 230px; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-title { font-size: 13px; font-weight: 700; margin-top: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .meta-bar { display: flex; justify-content: center; gap: 5px; margin-top: 5px; font-size: 9px; color: var(--text-gray); }
        .meta-bar span { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .rating-box { color: var(--gold); font-weight: bold; }
        
        .translator-tag { font-size: 10px; color: var(--primary); text-align: center; margin-top: 4px; opacity: 0.8; font-weight: 600; }

        /* --- Episode Modal --- */
        #episode-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; overflow-y: auto; }
        .modal-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 2; }
        .close-modal { font-size: 24px; color: #fff; cursor: pointer; margin-right: 15px; }
        .modal-title { font-size: 18px; font-weight: 800; flex: 1; text-align: center; }

        .episodes-container { padding: 15px; }
        .ep-row { 
            background: #0f1217; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 18px 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .ep-row:active { background: #1a1f26; }
        .ep-row span { font-size: 14px; font-weight: 600; color: #eee; }
        .play-icon { color: var(--primary); font-size: 14px; }

        /* --- Player --- */
        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; }
        .close-player { position: absolute; top: 20px; left: 20px; z-index: 10002; font-size: 20px; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-wall">
        <div class="lock-box">
            <h1 class="logo">BADINAN<span>FILM</span></h1>
            <p style="color: #666; font-size: 12px; margin-bottom: 20px;">سیستەمێ پاراستنێ</p>
            <input type="password" id="passInput" placeholder="دەربازببۆ">
            <button class="go-btn" onclick="startApp()">Unlock</button>

    </div>

    <div id="app">

        </div>
        <div class="episodes-container" id="ep-list"></div>
    </div>

    <div id="player">

        function startApp() { if(document.getElementById('passInput').value.length >= 8) { document.getElementById('auth-wall').style.display = 'none'; document.getElementById('app').style.display = 'block'; render(); } }
        
        function render() {
            const container = document.getElementById('main-container');
            container.innerHTML = movieDB.map(m => `
                <div class="card" onclick="${m.episodes ? `showEpisodes('${m.title}')` : `playVideo('${m.link}')`}">
                    <div class="card-img-box"><img src="${m.img}"></div>
                    <div class="card-title">${m.title}</div>
                    <div class="meta-bar">
                        <span>${m.duration}</span>
                        <span>${m.year}</span>
                        <span class="rating-box">${m.rating} ⭐</span>
                    </div>
                    <div class="translator-tag">وەرگێران: ${m.translator}</div>
                </div>
            `).join('');
        }

        function showEpisodes(t) {
            const m = movieDB.find(x => x.title === t);
            document.getElementById('m-title').innerText = t;
            document.getElementById('ep-list').innerHTML = m.episodes.map(e => `
                <div class="ep-row" onclick="playVideo('${e.link}')">
                    <span>${e.name}</span>
                    <div class="play-icon">▶</div>
                </div>
            `).join('');
            document.getElementById('episode-modal').style.display = 'block';
        }

        function closeEpisodes() { document.getElementById('episode-modal').style.display = 'none'; }
        function playVideo(u) { document.getElementById('videoFrame').src = u; document.getElementById('player').style.display = 'block'; }
        function stopVideo() { document.getElementById('player').style.display = 'none'; document.getElementById('videoFrame').src = ""; }
